global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OTel Collector self-metrics (also proxies app metrics)
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          service: 'otel-collector'

  # Direct app scrape targets (each NestJS app exposes /metrics)
  # These will be active once apps are running
  - job_name: 'gateway'
    static_configs:
      - targets: ['host.docker.internal:9464']
        labels:
          service: 'gateway'

  - job_name: 'transcription-worker'
    static_configs:
      - targets: ['host.docker.internal:9465']
        labels:
          service: 'transcription-worker'

  - job_name: 'cleaning-worker'
    static_configs:
      - targets: ['host.docker.internal:9466']
        labels:
          service: 'cleaning-worker'

  - job_name: 'insights-worker'
    static_configs:
      - targets: ['host.docker.internal:9467']
        labels:
          service: 'insights-worker'
