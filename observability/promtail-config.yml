server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

# ─── Scrape Configs ────────────────────────────────────────────────────────────
# One job per service so `service` is a static, accurate label per log file.
#
# Pipeline stages for each job:
#   1. json  → parse the pino JSON line, extract fields into the extracted map
#   2. labels → promote ONLY low-cardinality fields to Loki stream labels
#              (service, level, component)
#              HIGH-cardinality fields (meetingId, stage, reason, …) stay in
#              the JSON body and are queried with `| json | field="value"`.
#   3. timestamp → use pino's ISO timestamp instead of Promtail's ingest time
#
# The original JSON line is preserved as the log body (no `output` stage).
# ──────────────────────────────────────────────────────────────────────────────

scrape_configs:

  - job_name: gateway
    static_configs:
      - targets: ['localhost']
        labels:
          job: pipeline-logs
          service: gateway
          environment: development
          __path__: /logs/gateway.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            component: component
            log_ts: time
      - labels:
          level:
          component:
      - timestamp:
          source: log_ts
          format: RFC3339Nano

